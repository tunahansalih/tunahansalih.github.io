<section class="recent-news">
  <h2>Recent News</h2>
  <div class="news-list">
    {% assign sorted_news = site.data.news | sort: 'date' | reverse %}
    {% for item in sorted_news limit:4 %}
      <article class="news-item news-item--{{ item.type }}">
        <p class="news-date">{{ item.date | date: "%b %Y" }}</p>
        <p class="news-description">{{ item.description }}</p>

        {% if item.links %}
          <div class="news-links">
            {% for link in item.links %}
              <a href="{{ link.url }}" class="news-link" target="_blank" rel="noopener">{{ link.text }}</a>
            {% endfor %}
          </div>
        {% endif %}
      </article>
    {% endfor %}
  </div>

  <p class="view-all">
    <a href="{{ '/news/' | relative_url }}" class="view-all-link">View full timeline</a>
  </p>
</section>
